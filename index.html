<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynthLearn - Aprenda Inglês com Música</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <div class="container" id="app">
        <div class="header">
            <div class="brand-group">
                <div class="brand-icon">♪</div>
                <div>
                    <h1>🎵 <span>Synth</span>Learn</h1>
                    <p>Aprenda inglês com clipes, ritmo e desafio</p>
                </div>
            </div>

            <div class="header-meta">
                <div class="meta-pill" id="streakBadge">🔥 Série 0</div>
                <div class="meta-pill accent" id="scoreBadge">⭐ 0 acertos</div>
                <div class="progress-badge" id="progressBadge">1 / 5</div>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>

        <!-- CONTEÚDO PRINCIPAL COM SIDEBAR -->
        <div id="mainContent" class="main-content">
            <!-- Lado esquerdo: pergunta, opções, feedback, vídeo -->
            <div class="content-left" id="contentLeft">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando vídeos e perguntas...</p>
                </div>
            </div>

            <!-- Lado direito: Dicionário (aparece após responder) -->
            <div class="content-right" id="contentRight">
                <div class="dictionary-sidebar" id="dictionarySidebar">
                    <div class="dictionary-placeholder">
                        <span class="placeholder-icon">📖</span>
                        <p>O dicionário aparecerá aqui<br>após você responder!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  CARREGAR DADOS DO ARQUIVO JSON
        // ============================================================
        let allLessons = [];
        let remainingLessons = [];
        let currentIndex = 0;
        let answered = false;
        let correctCount = 0;
        let totalLessons = 0;
        let totalAnswered = 0;
        let streakCount = 0;

        const contentLeft = document.getElementById('contentLeft');
        const contentRight = document.getElementById('contentRight');
        const progressBadge = document.getElementById('progressBadge');
        const progressFill = document.getElementById('progressFill');
        const streakBadge = document.getElementById('streakBadge');
        const scoreBadge = document.getElementById('scoreBadge');

        // ============================================================
        //  FUNÇÃO PARA LIMPAR A FRASE
        // ============================================================
        function cleanPhrase(text) {
            let cleaned = text.replace(/^Como se diz:\s*"?|^Como se diz\s*"?/, '');
            cleaned = cleaned.replace(/^"|"$/g, '');
            cleaned = cleaned.replace(/^'|'$/g, '');
            cleaned = cleaned.replace(/\s*\?\s*$/, '');
            cleaned = cleaned.replace(/"/g, '');
            return cleaned.trim();
        }

        // ============================================================
        //  FUNÇÃO PARA EMBARALHAR ARRAY
        // ============================================================
        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ============================================================
        //  FUNÇÃO PARA EMBARALHAR AS OPÇÕES
        // ============================================================
        function shuffleOptions(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ============================================================
        //  FUNÇÃO PARA RENDERIZAR O DICIONÁRIO (SIDEBAR)
        // ============================================================
        function renderDictionarySidebar(lesson) {
            if (!lesson.dictionary) {
                return `
                    <div class="dictionary-placeholder">
                        <span class="placeholder-icon">📖</span>
                        <p>Esta música não tem<br>dicionário disponível</p>
                    </div>
                `;
            }

            const dict = lesson.dictionary;
            return `
                <div class="dictionary-header">
                    <span class="dict-icon">📖</span>
                    <span class="dict-title">Dicionário da Frase</span>
                </div>
                <div class="dictionary-content">
                    <div class="dict-row">
                        <span class="dict-label">📝 Tradução literal:</span>
                        <span class="dict-value">${dict.literal || lesson.english || '—'}</span>
                    </div>
                    ${dict.usage ? `
                    <div class="dict-row">
                        <span class="dict-label">💡 Como usar no dia a dia:</span>
                        <span class="dict-value">${dict.usage}</span>
                    </div>` : ''}
                    ${dict.explanation ? `
                    <div class="dict-row">
                        <span class="dict-label">📚 Explicação gramatical:</span>
                        <span class="dict-value">${dict.explanation}</span>
                    </div>` : ''}
                    ${dict.example ? `
                    <div class="dict-row">
                        <span class="dict-label">✏️ Exemplo em frase:</span>
                        <span class="dict-value dict-example">"${dict.example}"</span>
                    </div>` : ''}
                </div>
            `;
        }

        // ============================================================
        //  FUNÇÃO PARA CARREGAR OS DADOS
        // ============================================================
        async function carregarDados() {
            try {
                const response = await fetch('dados.json');
                if (!response.ok) {
                    throw new Error('Arquivo dados.json não encontrado');
                }
                const data = await response.json();
                allLessons = data.lessons;
                totalLessons = allLessons.length;
                iniciarNovoJogo();
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                contentLeft.innerHTML = `
                            <div style="text-align: center; padding: 40px; color: #ff6b9d;">
                                <div style="font-size: 3rem; margin-bottom: 15px;">⚠️</div>
                                <h3 style="color: #f5eeff; margin-bottom: 10px;">Erro ao carregar os dados!</h3>
                                <p style="color: #b0a0d0;">Verifique se o arquivo <strong>dados.json</strong> está na mesma pasta.</p>
                                <p style="color: #7a6a9a; font-size: 0.9rem; margin-top: 10px;">Detalhes: ${error.message}</p>
                            </div>
                        `;
            }
        }

        // ============================================================
        //  INICIAR NOVO JOGO
        // ============================================================
        function iniciarNovoJogo() {
            remainingLessons = shuffleArray(allLessons);
            currentIndex = 0;
            totalAnswered = 0;
            correctCount = 0;
            streakCount = 0;
            answered = false;
            updateHeaderStats();

            // LIMPA O DICIONÁRIO AO INICIAR O JOGO
            const dictionarySidebar = document.getElementById('dictionarySidebar');
            if (dictionarySidebar) {
                dictionarySidebar.innerHTML = `
                            <div class="dictionary-placeholder">
                                <span class="placeholder-icon">📖</span>
                                <p>O dicionário aparecerá aqui<br>após você responder!</p>
                            </div>
                        `;
            }

            renderQuestion();
        }

        // ============================================================
        //  FUNÇÃO PARA CRIAR PLAYER DE VÍDEO
        // ============================================================
        function createVideoPlayer(videoUrl, thumbnail = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'video-player-wrapper';

            const overlay = document.createElement('div');
            overlay.className = 'video-overlay';
            overlay.innerHTML = '<span>🎬 Agora é hora de conferir</span>';
            wrapper.appendChild(overlay);

            const video = document.createElement('video');
            video.controls = true;
            video.autoplay = true;
            video.preload = 'metadata';
            video.playsInline = true;

            if (thumbnail) {
                video.poster = thumbnail;
            }

            const source = document.createElement('source');
            source.src = videoUrl;
            source.type = 'video/mp4';
            video.appendChild(source);

            const webmSource = document.createElement('source');
            webmSource.src = videoUrl.replace('.mp4', '.webm');
            webmSource.type = 'video/webm';
            video.appendChild(webmSource);

            const fallback = document.createElement('p');
            fallback.textContent = 'Seu navegador não suporta vídeo.';
            fallback.style.cssText = 'color: #b0a0d0; padding: 20px; text-align: center;';
            video.appendChild(fallback);

            wrapper.appendChild(video);

            const nextBtn = document.createElement('button');
            nextBtn.className = 'next-btn';
            nextBtn.id = 'nextBtn';
            nextBtn.innerHTML = 'Próximo →';
            wrapper.appendChild(nextBtn);

            return wrapper;
        }

        // ============================================================
        //  RENDERIZAR PERGUNTA
        // ============================================================
        function renderQuestion() {
            if (remainingLessons.length === 0) {
                renderFinalScreen();
                return;
            }

            const lesson = remainingLessons[0];
            const shuffledOptions = shuffleOptions([...lesson.options]);
            const correctAnswer = lesson.options[lesson.correctIndex];
            const correctIndexShuffled = shuffledOptions.indexOf(correctAnswer);

            const cleanPhraseText = cleanPhrase(lesson.portuguese);

            answered = false;

            const letters = ['A', 'B', 'C'];
            let optionsHtml = shuffledOptions.map((opt, idx) => `
                            <button class="option-btn" data-index="${idx}" data-correct="${idx === correctIndexShuffled}">
                                <span class="letter">${letters[idx]}</span>
                                <span class="option-text">${opt}</span>
                            </button>
                        `).join('');

            const html = `
                            <div class="question-card">
                                <div class="question-label">
                                    <span class="label-dot"></span>
                                    COMO SE DIZ EM INGLÊS:
                                </div>
                                <div class="question-text">
                                    <span class="phrase-icon">“</span>
                                    ${cleanPhraseText}
                                    <span class="phrase-icon">”</span>
                                </div>
                            </div>

                            <div class="options" id="optionsContainer">
                                ${optionsHtml}
                            </div>

                            <div class="feedback-area" id="feedbackArea">
                                <div id="feedbackResult" style="display: none;"></div>
                                <div id="videoContainer" style="display: none;"></div>
                                <div class="feedback-text" id="feedbackText">
                                    💡 Clique na opção correta para assistir ao clipe da música!
                                </div>
                            </div>
                        `;

            contentLeft.innerHTML = html;
            updateProgress();
            updateHeaderStats();

            // ============================================================
            // LIMPA O DICIONÁRIO AO CARREGAR UMA NOVA PERGUNTA
            // ============================================================
            const dictionarySidebar = document.getElementById('dictionarySidebar');
            if (dictionarySidebar) {
                dictionarySidebar.innerHTML = `
                            <div class="dictionary-placeholder">
                                <span class="placeholder-icon">📖</span>
                                <p>O dicionário aparecerá aqui<br>após você responder!</p>
                            </div>
                        `;
            }

            const optionBtns = document.querySelectorAll('.option-btn');
            const feedbackText = document.getElementById('feedbackText');
            const feedbackResult = document.getElementById('feedbackResult');
            const videoContainer = document.getElementById('videoContainer');
            const feedbackArea = document.getElementById('feedbackArea');

            let nextBtn = null;

            optionBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    if (answered) return;
                    const isCorrect = this.dataset.correct === 'true';
                    const chosenBtn = this;

                    optionBtns.forEach(b => {
                        b.disabled = true;
                        if (b.dataset.correct === 'true') {
                            b.classList.add('correct');
                        }

                        if (isCorrect) {
                            if (b.dataset.correct !== 'true') {
                                b.style.display = 'none';
                            }
                        } else {
                            if (b !== chosenBtn && b.dataset.correct !== 'true') {
                                b.style.display = 'none';
                            }
                        }
                    });

                    if (!isCorrect) {
                        chosenBtn.classList.add('wrong');
                        streakCount = 0;
                    } else {
                        correctCount++;
                        streakCount++;
                    }

                    answered = true;
                    updateHeaderStats();

                    const songTitle = lesson.songTitle || 'Música';
                    const correctPhrase = lesson.options[lesson.correctIndex];

                    // ============================================================
                    // 1. ESCONDE O TEXTO INICIAL
                    // ============================================================
                    feedbackText.style.display = 'none';

                    // ============================================================
                    // 2. MOSTRA O RESULTADO (Acertou/Errou)
                    // ============================================================
                    feedbackResult.style.display = 'block';
                    if (isCorrect) {
                        feedbackResult.innerHTML = `
                                    <div class="feedback-result correct">
                                        <span class="icon">✅</span>
                                        <span>Acertou!</span>
                                    </div>
                                    <div>"${correctPhrase}" — 🎬 <strong>${songTitle}</strong></div>
                                    <div class="feedback-highlight">🔥 Série atual: ${streakCount}</div>
                                `;
                    } else {
                        feedbackResult.innerHTML = `
                                    <div class="feedback-result wrong">
                                        <span class="icon">❌</span>
                                        <span>Errou!</span>
                                    </div>
                                    <div>A resposta certa era: <strong>${correctPhrase}</strong> — 🎬 <strong>${songTitle}</strong></div>
                                    <div class="feedback-highlight">💫 Série reiniciada</div>
                                `;
                    }

                    // ============================================================
                    // 3. MOSTRA O DICIONÁRIO NA SIDEBAR (AO LADO)
                    // ============================================================
                    const sidebar = document.getElementById('dictionarySidebar');
                    if (sidebar) {
                        sidebar.innerHTML = renderDictionarySidebar(lesson);
                    }

                    // ============================================================
                    // 4. MOSTRA O VÍDEO
                    // ============================================================
                    videoContainer.style.display = 'block';
                    const videoPlayer = createVideoPlayer(lesson.videoUrl, lesson.thumbnail);
                    videoContainer.innerHTML = '';
                    videoContainer.appendChild(videoPlayer);

                    feedbackArea.classList.add('has-feedback');

                    nextBtn = videoPlayer.querySelector('.next-btn');
                    nextBtn.classList.add('active');

                    nextBtn.addEventListener('click', function() {
                        if (!answered) return;

                        const video = videoPlayer.querySelector('video');
                        if (video) {
                            video.pause();
                            video.currentTime = 0;
                        }

                        remainingLessons.shift();
                        totalAnswered++;

                        // ============================================================
                        // LIMPA O DICIONÁRIO ANTES DE CARREGAR A PRÓXIMA PERGUNTA
                        // ============================================================
                        const sidebarClean = document.getElementById('dictionarySidebar');
                        if (sidebarClean) {
                            sidebarClean.innerHTML = `
                                <div class="dictionary-placeholder">
                                    <span class="placeholder-icon">⏳</span>
                                    <p>Carregando próxima música...</p>
                                </div>
                            `;
                        }

                        renderQuestion();
                    });
                });
            });
        }

        // ============================================================
        //  TELA FINAL
        // ============================================================
        function renderFinalScreen() {
            const percentage = Math.round((correctCount / totalLessons) * 100);
            let message = '';
            let emoji = '';

            if (percentage === 100) { emoji = '🏆';
                message = 'Perfeito! Você é um gênio da música!'; } else if (percentage >= 80) { emoji = '🌟';
                message = 'Muito bem! Quase lá!'; } else if (percentage >= 50) { emoji = '💪';
                message = 'Bom trabalho! Continue praticando!'; } else { emoji = '📚';
                message = 'Valeu pelo esforço! Tente novamente!'; }

            const html = `
                            <div class="final-screen">
                                <div class="trophy">${emoji}</div>
                                <h2>Você completou todas!</h2>
                                <p>${message}</p>
                                <div class="score-display">
                                    <span class="score-number">${correctCount}</span> / ${totalLessons} acertos
                                </div>
                                <div class="score-bar">
                                    <div class="score-bar-fill" style="width: ${percentage}%;"></div>
                                </div>
                                <button class="restart-btn" id="restartBtn">🔄 Recomeçar (nova ordem aleatória)</button>
                            </div>
                        `;

            contentLeft.innerHTML = html;
            progressBadge.textContent = `🎉 Fim!`;
            progressFill.style.width = '100%';
            updateHeaderStats();

            // Limpa a sidebar
            document.getElementById('dictionarySidebar').innerHTML = `
                            <div class="dictionary-placeholder">
                                <span class="placeholder-icon">🎉</span>
                                <p>Jogo finalizado!</p>
                            </div>
                        `;

            document.getElementById('restartBtn').addEventListener('click', () => {
                iniciarNovoJogo();
            });
        }

        // ============================================================
        //  ATUALIZAR PROGRESSO
        // ============================================================
        function updateHeaderStats() {
            if (streakBadge) {
                streakBadge.textContent = `🔥 Série ${streakCount}`;
            }
            if (scoreBadge) {
                scoreBadge.textContent = `⭐ ${correctCount} acertos`;
            }
        }

        function updateProgress() {
            const safeTotal = totalLessons || 1;
            progressBadge.textContent = `${Math.min(totalAnswered + 1, safeTotal)} / ${safeTotal}`;
            const percent = safeTotal > 0 ? (totalAnswered / safeTotal) * 100 : 0;
            progressFill.style.width = `${percent}%`;
        }

        // ============================================================
        //  INICIAR
        // ============================================================
        carregarDados();
    </script>

</body>
</html>
